<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Set New Password | Landed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css" />
    <script defer src="/static/auth.js"></script>
    <script type="module" src="/static/reset-password.js"></script>
  </head>
  <body data-page="reset-password">
    <main class="auth-shell">
      <section class="auth-card">
        <a href="/" class="wordmark auth-wordmark">Landed</a>

        <div class="auth-jordan-intro">
          <div class="auth-jordan-avatar">
            <div class="auth-jordan-ring"><span class="auth-jordan-letter">J</span></div>
            <div class="auth-jordan-pulse"></div>
          </div>
          <div class="auth-jordan-body">
            <span class="auth-jordan-name">Jordan</span>
            <p class="auth-jordan-line">Ready to set a new password?</p>
          </div>
        </div>

        <h1 class="auth-title">Choose a new password</h1>
        <p id="reset-password-status" class="auth-copy">Checking your reset link now.</p>

        <div id="reset-password-invalid" class="auth-invalid hidden">
          <p class="auth-error">This link has expired. Request a new one.</p>
          <p class="auth-switch"><a href="/forgot-password">Get a fresh reset link</a></p>
        </div>

        <form id="reset-password-form" class="auth-form hidden">
          <label class="auth-label" for="password">New password</label>
          <input id="password" name="password" class="auth-input" type="password" autocomplete="new-password" required minlength="8" />
          <p class="auth-hint">Use at least 8 characters.</p>
          <p id="reset-password-error" class="auth-error hidden"></p>
          <button class="cta-button auth-submit" type="submit">Set new password</button>
        </form>
      </section>
    </main>
  </body>
</html>
