<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Landed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css" />
    <script defer src="/static/auth.js"></script>
    <script type="module" src="/static/login.js"></script>
  </head>
  <body data-page="login">
    <main class="auth-shell">
      <section class="auth-card">
        <a href="/" class="wordmark auth-wordmark">Landed</a>
        <h1 class="auth-title">Sign in</h1>
        <p class="auth-copy">Use your account to access your resume, pipeline, and Jordan sessions.</p>
        <form id="auth-form" class="auth-form">
          <label class="auth-label" for="email">Email</label>
          <input id="email" name="email" class="auth-input" type="email" autocomplete="email" required />
          <label class="auth-label" for="password">Password</label>
          <input id="password" name="password" class="auth-input" type="password" autocomplete="current-password" required minlength="8" />
          <p id="auth-error" class="auth-error hidden"></p>
          <button class="cta-button auth-submit" type="submit">Sign in</button>
        </form>
        <p class="auth-switch">New here? <a href="/register">Create an account</a></p>
      </section>
    </main>
  </body>
</html>
