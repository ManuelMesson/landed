<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sign In | Landed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css" />
    <script defer src="/static/auth.js"></script>
    <script type="module" src="/static/login.js"></script>
  </head>
  <body data-page="login">
    <main class="auth-shell">
      <section class="auth-card">
        <a href="/" class="wordmark auth-wordmark">Landed</a>

        <!-- Jordan welcomes them back -->
        <div class="auth-jordan-intro">
          <div class="auth-jordan-avatar">
            <div class="auth-jordan-ring"><span class="auth-jordan-letter">J</span></div>
            <div class="auth-jordan-pulse"></div>
          </div>
          <div class="auth-jordan-body">
            <span class="auth-jordan-name">Jordan</span>
            <p class="auth-jordan-line">Welcome back. Your sessions are waiting.</p>
          </div>
        </div>

        <h1 class="auth-title">Sign in</h1>
        <p id="auth-toast" class="auth-success hidden"></p>
        <form id="auth-form" class="auth-form">
          <label class="auth-label" for="email">Email</label>
          <input id="email" name="email" class="auth-input" type="email" autocomplete="email" required />
          <label class="auth-label" for="password">Password</label>
          <input id="password" name="password" class="auth-input" type="password" autocomplete="current-password" required minlength="8" />
          <p class="auth-forgot"><a href="/forgot-password">Forgot password?</a></p>
          <p id="auth-error" class="auth-error hidden"></p>
          <button class="cta-button auth-submit" type="submit">Sign in</button>
        </form>
        <p class="auth-switch">New here? <a href="/register">Create an account</a></p>
      </section>
    </main>
  </body>
</html>
