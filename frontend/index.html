<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css" />
    <script defer src="/static/index.js"></script>
  </head>
  <body data-page="analyzer">

    <div id="toast-container"></div>

    <!-- ── Minimal header ── -->
    <header class="top-bar">
      <span class="wordmark">Landed</span>
      <div class="top-bar-right">
        <select id="track-select" class="track-pill"></select>
        <a href="/tracker" class="nav-pill">Pipeline →</a>
      </div>
    </header>

    <main class="flow-main">

      <!-- ── STAGE 1: Input ── -->
      <section id="stage-input" class="stage stage-active">
        <h2 class="stage-label">Paste a job post</h2>
        <textarea id="job-post" class="job-textarea" placeholder="Paste the full job description here…"></textarea>
        <div class="stage-actions">
          <button id="analyze-button" class="cta-button" type="button">
            <span class="btn-label">Analyze</span>
            <span class="btn-spinner hidden"></span>
          </button>
        </div>
        <div id="analysis-loading" class="skeleton-row hidden">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </section>

      <!-- ── STAGE 2: Score hero (hidden until analysis) ── -->
      <section id="stage-score" class="stage hidden">
        <div class="score-hero">
          <div class="score-block">
            <span class="score-label">ATS match</span>
            <strong id="ats-score" class="score-number">—</strong>
            <div class="meter"><div id="ats-meter" class="meter-fill"></div></div>
          </div>
          <div class="score-divider"></div>
          <div class="score-block">
            <span class="score-label">HM confidence</span>
            <strong id="hm-score" class="score-number">—</strong>
            <div class="meter"><div id="hm-meter" class="meter-fill"></div></div>
          </div>
        </div>

        <p id="role-summary" class="role-summary-text"></p>

        <!-- One primary action at a time -->
        <div class="action-strip">
          <button id="tune-button" class="action-pill action-secondary" type="button">✏️ Tune resume</button>
          <button id="log-job" class="action-pill action-secondary" type="button">📋 Log this job</button>
          <a href="/jordan" class="action-pill action-primary">🎙 Prep with Jordan →</a>
        </div>
      </section>

      <!-- ── STAGE 3: Resume tuner (slides in) ── -->
      <section id="stage-tune" class="stage hidden">
        <div class="tune-header">
          <h2 class="stage-label">Tune your resume</h2>
          <button id="close-tune" class="ghost-pill" type="button">Done ✓</button>
        </div>
        <button id="save-resume" class="ghost-pill save-pill" type="button">Save as base</button>

        <div id="resume-editor" class="resume-editor" aria-label="Edit resume">
          <div class="resume-row">
            <label class="resume-label" for="resume-name-title">Name</label>
            <input id="resume-name-title" name="nameTitle" type="text" class="resume-input" placeholder="Manuel Messon-Roque" />
          </div>
          <div class="resume-row">
            <label class="resume-label" for="resume-contact">Contact</label>
            <input id="resume-contact" name="contact" type="text" class="resume-input" placeholder="Seattle, WA · manuelmesson@gmail.com" />
          </div>

          <div class="resume-section-wrap">
            <div class="resume-section-title">Experience</div>
            <div id="experience-list" class="entry-list"></div>
            <button id="add-experience" class="add-entry-button" type="button">+ Add</button>
          </div>

          <div class="resume-section-wrap">
            <div class="resume-section-title">Projects</div>
            <div id="project-list" class="entry-list"></div>
            <button id="add-project" class="add-entry-button" type="button">+ Add</button>
          </div>

          <div class="resume-row">
            <label class="resume-label" for="resume-skills">Skills</label>
            <textarea id="resume-skills" name="skills" rows="2" class="resume-input" placeholder="Customer Success, HubSpot, Process Improvement"></textarea>
          </div>
          <div class="resume-row">
            <label class="resume-label" for="resume-education">Education</label>
            <textarea id="resume-education" name="education" rows="2" class="resume-input" placeholder="Seattle Central College, Associate of Business, Dec 2025"></textarea>
          </div>
        </div>
      </section>

      <!-- ── STAGE 4: Log job (slides in) ── -->
      <section id="stage-log" class="stage hidden">
        <div class="tune-header">
          <h2 class="stage-label">Log this application</h2>
          <button id="close-log" class="ghost-pill" type="button">Cancel</button>
        </div>
        <div class="log-form">
          <div class="log-row">
            <label class="resume-label" for="company">Company</label>
            <input id="company" type="text" class="resume-input" placeholder="Amazon" />
          </div>
          <div class="log-row">
            <label class="resume-label" for="role">Role</label>
            <input id="role" type="text" class="resume-input" placeholder="Customer Success Specialist" />
          </div>
          <div class="log-row">
            <label class="resume-label" for="date-applied">Date</label>
            <input id="date-applied" type="date" class="resume-input" />
          </div>
          <button id="confirm-log" class="cta-button" type="button">Confirm &amp; log →</button>
        </div>
      </section>

      <!-- ── Analysis details accordion (hidden until score) ── -->
      <section id="stage-analysis" class="stage hidden">
        <div class="accordion-grid">
          <details class="accordion-card" open>
            <summary>Key requirements</summary>
            <ul id="key-requirements" class="pill-list"></ul>
          </details>
          <details class="accordion-card">
            <summary>Your strengths</summary>
            <ul id="your-strengths" class="pill-list"></ul>
          </details>
          <details class="accordion-card">
            <summary>Gaps to address</summary>
            <ul id="gaps-to-address" class="pill-list"></ul>
          </details>
          <details class="accordion-card">
            <summary>Talking points</summary>
            <ul id="talking-points" class="pill-list"></ul>
          </details>
          <details class="accordion-card">
            <summary>Red flags</summary>
            <ul id="red-flags" class="pill-list"></ul>
          </details>
        </div>
      </section>

    </main>
  </body>
</html>
