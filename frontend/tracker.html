<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Pipeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css" />
    <script defer src="/static/auth.js"></script>
    <script type="module" src="/static/tracker.js"></script>
  </head>
  <body data-page="tracker">
    <div class="page-shell">
      <header class="hero compact">
        <div>
          <p class="eyebrow">Landed</p>
          <h1>Your Pipeline</h1>
        </div>
        <nav class="top-nav">
          <a href="/" class="nav-link">Analyzer</a>
          <a href="/tracker" class="nav-link current">Your Pipeline</a>
          <span data-auth-slot></span>
        </nav>
      </header>

      <main>
        <!-- Jordan pipeline summary -->
        <div id="jordan-pipeline-bar" class="jordan-pipeline-bar">
          <div class="jordan-pipeline-avatar">
            <div class="auth-jordan-ring"><span class="auth-jordan-letter">J</span></div>
            <div class="auth-jordan-pulse"></div>
          </div>
          <p id="jordan-pipeline-message" class="jordan-pipeline-message">Loading your pipeline…</p>
        </div>

        <section class="toolbar card">
          <label for="tracker-track-select">Track filter</label>
          <select id="tracker-track-select"></select>
          <span id="tracker-summary" class="mini-label"></span>
        </section>

        <section class="card">
          <div id="empty-state" class="empty-state hidden">No applications yet. Paste a job post to start.</div>
          <div class="table-wrap">
            <table class="pipeline-table">
              <thead>
                <tr>
                  <th>Company</th>
                  <th>Role</th>
                  <th>Track</th>
                  <th>Date</th>
                  <th>ATS</th>
                  <th>HM</th>
                  <th>Status</th>
                  <th>Jordan</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="jobs-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
