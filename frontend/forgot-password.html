<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Forgot Password | Landed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css" />
    <script defer src="/static/auth.js"></script>
    <script type="module" src="/static/forgot-password.js"></script>
  </head>
  <body data-page="forgot-password">
    <main class="auth-shell">
      <section class="auth-card">
        <a href="/" class="wordmark auth-wordmark">Landed</a>

        <div class="auth-jordan-intro">
          <div class="auth-jordan-avatar">
            <div class="auth-jordan-ring"><span class="auth-jordan-letter">J</span></div>
            <div class="auth-jordan-pulse"></div>
          </div>
          <div class="auth-jordan-body">
            <span class="auth-jordan-name">Jordan</span>
            <p class="auth-jordan-line">Forgot your password? No problem. Give me your email and I'll send a reset link.</p>
          </div>
        </div>

        <h1 class="auth-title">Reset access</h1>
        <p class="auth-copy">Use the email tied to your Landed account. If it exists, the reset link will expire in one hour.</p>
        <form id="forgot-password-form" class="auth-form">
          <label class="auth-label" for="email">Email</label>
          <input id="email" name="email" class="auth-input" type="email" autocomplete="email" required />
          <p id="forgot-password-error" class="auth-error hidden"></p>
          <p id="forgot-password-success" class="auth-success hidden"></p>
          <button class="cta-button auth-submit" type="submit">Send reset link</button>
        </form>
        <p class="auth-switch">Remembered it? <a href="/login">Back to sign in</a></p>
      </section>
    </main>
  </body>
</html>
