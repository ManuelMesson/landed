<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prep with Jordan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="stylesheet" href="/static/jordan-ui.css" />
    <script defer src="/static/auth.js"></script>
    <script defer src="/static/jordan.js"></script>
  </head>
  <body data-page="jordan">

    <!-- ── Top bar ── -->
    <header class="top-bar">
      <span class="wordmark">Landed</span>
      <div class="top-bar-right">
        <a href="/" class="nav-pill">Analyzer</a>
        <a href="/tracker" class="nav-pill">Pipeline →</a>
        <div data-auth-slot></div>
      </div>
    </header>

    <main class="jordan-main">

      <!-- ── PHASE 1: Warmup ── -->
      <section id="phase-warmup" class="jordan-phase">
        <div class="jordan-avatar">
          <div class="avatar-ring">
            <span class="avatar-letter">J</span>
          </div>
          <div class="avatar-pulse"></div>
        </div>
        <h1 class="jordan-name">Jordan</h1>
        <p class="jordan-tagline">Your interview coach. Warm, direct, no weak answers allowed.</p>
        <div id="warmup-card" class="warmup-card">
          <div class="warmup-loading">
            <div class="skeleton-card" style="height:18px;margin-bottom:10px"></div>
            <div class="skeleton-card" style="height:18px;width:80%"></div>
          </div>
        </div>
        <button id="start-button" class="cta-button" type="button" disabled>
          <span class="btn-label">Loading...</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </section>

      <!-- ── PHASE 2: Session ── -->
      <section id="phase-session" class="jordan-phase hidden">

        <!-- Jordan's current message -->
        <div class="jordan-bubble-wrap">
          <div class="jordan-avatar-sm">
            <span>J</span>
          </div>
          <div class="bubble-col">
            <span class="bubble-name">Jordan</span>
            <div id="coaching-bubble" class="bubble jordan-coaching hidden"></div>
            <div id="question-bubble" class="bubble jordan-question">
              <span id="current-question">Loading...</span>
            </div>
            <div id="jordan-thinking" class="bubble jordan-thinking hidden">
              <span class="thinking-dot"></span>
              <span class="thinking-dot"></span>
              <span class="thinking-dot"></span>
            </div>
          </div>
        </div>

        <!-- User answers -->
        <div id="user-messages" class="user-messages"></div>

        <!-- Audio (hidden) -->
        <audio id="jordan-audio" preload="auto" style="display:none"></audio>

        <!-- Input zone -->
        <div id="input-zone" class="input-zone">
          <div class="mic-zone">
            <button id="mic-button" class="big-mic-button" type="button">
              <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
              <span class="mic-label">Hold to speak</span>
            </button>
          </div>
          <div class="text-input-row">
            <textarea id="answer-text" class="answer-input" rows="2" placeholder="Or type your answer here…"></textarea>
            <button id="submit-answer" class="send-button" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
          <button id="retry-button" class="retry-button hidden" type="button">↩ Try that answer again</button>
        </div>

      </section>

      <!-- ── PHASE 3: Summary ── -->
      <section id="phase-summary" class="jordan-phase hidden">
        <div class="jordan-avatar">
          <div class="avatar-ring avatar-ring-green">
            <span class="avatar-letter">J</span>
          </div>
        </div>
        <h2 class="summary-title">Session complete.</h2>
        <div id="summary-card" class="summary-card">
          <div class="skeleton-card" style="height:16px;margin-bottom:8px"></div>
          <div class="skeleton-card" style="height:16px;width:90%;margin-bottom:8px"></div>
          <div class="skeleton-card" style="height:16px;width:70%"></div>
        </div>
        <div class="summary-actions">
          <button id="restart-button" class="action-pill action-secondary" type="button">↩ Run it again</button>
          <a href="/tracker" class="action-pill action-primary">Go to Pipeline →</a>
        </div>
      </section>

    </main>
  </body>
</html>
